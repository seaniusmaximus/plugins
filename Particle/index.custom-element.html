<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Particle Custom Element Preview</title>
    <style>
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Open Sans", sans-serif;
      }
      #particles-container {
        display: grid;
        grid-template-columns: 1fr 2fr;
        grid-column-gap: 10px;
        grid-row-gap: 10px;
        margin: 2em;
      }
      yahoo-particle-component {
        display: block;
        position: relative;
        margin-bottom: 1em;
      }
      [id^="settings-particle_"] {
        margin-bottom: 10px;
        max-width: 400px;
      }
      .settings-box {
        background-color: white;
        border: 1px solid rgba(204, 204, 204, 0.5);
        margin-bottom: 1em;
        padding-top: 1em;
        padding-bottom: 1em;
        min-width: 300px;
      }
      .settings-box legend {
        font-size: smaller;
        font-weight: bold;
      }
      #control-panel {
        border: 2px dashed #ccc;
        position: fixed;
        bottom: 15px;
        right: 15px;
        background-color: rgba(255, 255, 255, 0.8);
        padding: 1em;
        box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.2);
      }
      h3 {
        margin: 0.5em 0;
      }
    </style>
    <script src="{ACEAPI_URL}"></script>
    <script src="{PLUGIN_URL}" language="javascript"></script>
    <script src="{CUSTOM_ELEMENTS_FILENAME}"></script>
    <script src="custom-element-preview.js"></script>
  </head>
  <body>
    <div id="particles-container"></div>
  </body>
</html>
