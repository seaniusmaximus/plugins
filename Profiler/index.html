<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="ad.frame" content="child" />
    <title>Profiler Plugin Examples</title>
    <style>

      .quiz-container {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
      }

      .quiz {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
      }

      .question {
          font-size: 24px;
          font-weight: bold;
          margin-bottom: 20px;
          animation: fadeIn 0.6s ease-in-out;
      }

      .option {
          font-size: 18px;
          margin-bottom: 10px;
          padding: 10px 20px;
          border-radius: 5px;
          background-color: #f0f0f0;
          cursor: pointer;
      }

      .results {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          font-size: 24px;
          font-weight: bold;
          margin-bottom: 20px;
          height: 100vh;
          animation: fadeIn 0.6s ease-in-out;
          animation-fill-mode: both;
      }

      .results img {
          max-width: 5%;
      }

      .results img, .results p, .results h2 {
          animation: fadeIn 0.6s ease-in-out;
          animation-fill-mode: both;
      }
      .results h2 {
          animation-delay: 0.1s;
      }
      .results img {
          animation-delay: 0.2s;
      }
      .results p {
          animation-delay: 0.3s;
      }

      @keyframes fadeIn {
          from {
              opacity: 0;
              transform: translateY(20px);
          }
          to {
              opacity: 1;
              transform: translateY(0);
          }
      }

      .option {
          animation: fadeIn 0.6s ease-in-out;
          animation-fill-mode: both;
      }

      .option:nth-child(1) { animation-delay: 0.1s; }
      .option:nth-child(2) { animation-delay: 0.2s; }
      .option:nth-child(3) { animation-delay: 0.3s; }
      .option:nth-child(4) { animation-delay: 0.4s; }
      .option:nth-child(5) { animation-delay: 0.5s; }
      .option:nth-child(6) { animation-delay: 0.6s; }
      .submit-button {
          animation: fadeIn 0.6s ease-in-out;
          animation-fill-mode: both;
          animation-delay: 0.7s;
      }
    </style>
    <script src="/libraries/AD.js"></script>
    <script src="Profiler.js" language="javascript" type="module"></script>
