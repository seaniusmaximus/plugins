<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SizeManager Library Demo</title>

    <!-- Include the Isi library -->
    <script src="/libraries/AD.js"></script>
    <script src="SizeManager.js" language="javascript" type="module"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      #SizeManagerContainer {
          width: 100vw;
          height: 100vh;
          border: 2px solid #000;
          position: relative;
          overflow: hidden;
      }
      #AdBox {
          width: 100%;
          height: 100%;
          background-color: #f0f0f0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
      }
      .wide {
          width: 600px !important;
          border: 1px solid red;

        }
        .mid {
          width: 400px !important;
          border: 1px solid orange;
        }
        .mobile {
          width: 300px !important;
          border: 1px solid green;
        }
    </style>
  </head>
  <body>
    <div id="SizeManagerContainer">
      <div id="AdBox">
        <h1>SizeManager Plugin Demo</h1>
        <p>The SizeManager plugin helps manage and adjust the size of ad containers dynamically.</p>
        <p>Open the console to see debug messages from the SizeManager plugin.</p>
      </div>
    </div>

    <script type="module">
      import SizeManager from './SizeManager.js'
      // Initialize the SizeManager plugin when $AD is ready
      $AD.ready(() => {
        // Create an instance of the SizeManager plugin
        const sizeManager = new SizeManager({
          containerID: 'SizeManagerContainer',
          adId: 'AdBox', // Assuming there's an element with this ID
          scaleBetween: true,
          center: true,
          breakpoints: [
            { class: 'wide', ratio: '16:3' },
            { class: 'mid', ratio: '40:9' },
            { class: 'mobile', ratio: '16:9' },
          ],
          debug: true
        });
        sizeManager.init();
        // Example usage of SizeManager methods can be added here
      });
    </script>
  </body>
</html>
